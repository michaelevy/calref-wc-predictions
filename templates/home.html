<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>CalRef World Cup Predictions</title>
        <style>
            body {
                font-family: system-ui, sans-serif;
                max-width: 40rem;
                margin: 4rem auto;
                padding: 0 1rem;
                line-height: 1.5;
            }
        </style>
    </head>
    <body>
        {{template "nav" .}}

        <h1>CalRef World Cup Predictions</h1>

        {{if .}}
        <div class="card">
            <div><strong> {{.Username}}</strong><br /></div>
        </div>
        <p>Logged in ^-^</p>
        <p><a href="predict">Create your rankings</a></p>
        {{else}}
        <p><a href="/login">Login with Discord</a></p>
        <p>
            (You will be redirected to discord to login, this application will
            not recieve your credentials)
        </p>
        <p><a href="/login/nationstates">Login with NationStates</a></p>
        {{end}}
    </body>
</html>
