<!doctype html>
<html lang="en">
    {{template "head" "Leaderboard"}}

    <body>
        {{template "nav" .User}}

        <h1>Leaderboard</h1>
        {{if .Entries}}
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Player</th>
                    <th>Points</th>
                </tr>
            </thead>
            <tbody>
                {{range $i, $e := .Entries}}
                <tr>
                    <td>{{add $i 1}}</td>
                    <td>{{$e.Username}}</td>
                    <td>{{$e.Points}}</td>
                </tr>
                {{end}}
            </tbody>
        </table>
        {{else}}
        <p>eeeeeeeeeeeeeeeeeeeeeeee</p>
        {{end}}
    </body>
</html>
