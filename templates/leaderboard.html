<!doctype html>
<html lang="en">
    {{template "head" "Leaderboard"}}

    <body>
        {{template "nav" .User}}
        <main class="flex-column outline centre">
            <h2 class="title centre">Leaderboard</h2>
            {{if .Entries}}
            <table class="centre inbox">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Player</th>
                        <th>Points</th>
                    </tr>
                </thead>
                <tbody>
                    {{range $i, $e := .Entries}}
                    <tr>
                        <td>{{add $i 1}}</td>
                        <td>{{$e.Username}}</td>
                        <td>{{$e.Points}}</td>
                    </tr>
                    {{end}}
                </tbody>
            </table>
            {{else}}
            <p>eeeeeeeeeeeeeeeeeeeeeeee</p>
            {{end}}
        </main>
    </body>
</html>
