<!doctype html>
<html lang="en">
    {{template "head" "Ranking"}}
    <style>
        .nation {
            border: 1px solid #ccc;
            margin: 5px;
            width: 150px;
            text-align: center;
            border-radius: 2.5px;
            margin-left: 20px;
            background-color: #0224644f;
            cursor: pointer;
        }

        .nation:hover {
            background-color: #09f;
        }
    </style>
    <body>
        {{template "nav" .User}}
        <main class="container outline">
            <h2 class="title centre">Rankings</h2>
            {{if .HasSubmitted}}
            <div class="centre">
                <p class="notif okay">Here are the rankings you submitted:</p>
                <hr />
                <ol class="flex-column flex-left" style="height: 100vh">
                    {{range .Teams}}
                    <li style="width: 200px">{{.Name}}</li>
                    {{end}}
                </ol>
                <p><a href="/">Back home</a></p>
            </div>
            {{else}}
            <p>Drag to reorder (default: fifa rankings)</p>
            <form method="POST" action="/predict" id="rankForm">
                <ol id="teamList" style="height: 80vh" class="flex-column">
                    {{range .Teams}}
                    <li data-id="{{.ID}}" class="nation">{{.Name}}</li>
                    {{end}}
                </ol>
                <button type="submit" class="button is-info">
                    Save rankings
                </button>
            </form>
            <script src="https://cdn.jsdelivr.net/npm/sortablejs@1/Sortable.min.js"></script>
            <script>
                new Sortable(document.getElementById("teamList"));
                document
                    .getElementById("rankForm")
                    .addEventListener("submit", function () {
                        document
                            .querySelectorAll("#teamList li")
                            .forEach(function (li) {
                                var inp = document.createElement("input");
                                inp.type = "hidden";
                                inp.name = "team";
                                inp.value = li.dataset.id;
                                this.appendChild(inp);
                            }, this);
                    });
            </script>
            {{end}}
        </main>
    </body>
</html>
